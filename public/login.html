<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bookverse Login</title>
  <link rel="stylesheet" href="/styles.css">
  <style>
    body { 
      margin: 0; 
      padding: 20px; 
      background: linear-gradient(135deg, #f5f5f5 0%, #e8e8e8 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    .login-container {
      width: 100%;
      max-width: 420px;
    }
    .login-card {
      background: white;
      border-radius: 12px;
      padding: 40px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
    }
    .login-card h1 {
      margin: 0 0 8px 0;
      font-size: 28px;
      font-weight: 700;
      color: #1a1a1a;
    }
    .login-card > p {
      margin: 0 0 32px 0;
      color: #666;
      font-size: 14px;
      line-height: 1.6;
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-group label {
      display: block;
      font-weight: 600;
      margin-bottom: 8px;
      color: #333;
      font-size: 14px;
    }
    .form-group input {
      width: 100%;
      padding: 11px 14px;
      border: 1px solid #d0d0d0;
      border-radius: 6px;
      font-size: 14px;
      box-sizing: border-box;
      transition: border-color 0.2s;
    }
    .form-group input:focus {
      outline: none;
      border-color: #8b3a3a;
      box-shadow: 0 0 0 3px rgba(139, 58, 58, 0.1);
    }
    .login-btn {
      width: 100%;
      padding: 12px;
      background: #8b3a3a;
      color: white;
      border: none;
      border-radius: 6px;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s;
    }
    .login-btn:hover {
      background: #a84848;
    }
    .login-btn:active {
      transform: scale(0.98);
    }
    .message {
      margin-top: 16px;
      padding: 12px 14px;
      border-radius: 6px;
      font-size: 13px;
      line-height: 1.5;
    }
    .message.success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }
    .message.error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }
    .auth-links {
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid #e5e5e5;
      text-align: center;
      font-size: 13px;
    }
    .auth-links a {
      color: #8b3a3a;
      text-decoration: none;
      display: block;
      margin: 8px 0;
      transition: color 0.2s;
    }
    .auth-links a:hover {
      color: #a84848;
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <h1>Login</h1>
      <p>Welcome back! Enter your email and password to continue.</p>

      <form id="loginForm" onsubmit="return false;">
        <div class="form-group">
          <label for="email">Email</label>
          <input id="email" type="email" placeholder="Enter your email" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input id="password" type="password" placeholder="Enter your password" required>
        </div>
        <button id="submit" class="login-btn" type="submit">LOGIN</button>
        <div id="message" class="message" style="display:none;"></div>
      </form>

      <div class="auth-links">
        <a href="/register">Don't have an account? Register now</a>
        <a href="/">Back to Store</a>
      </div>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script>
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const submitButton = document.getElementById('submit');
    const messageBox = document.getElementById('message');

    function showMessage(text, type = 'success') {
      messageBox.textContent = text;
      messageBox.className = type === 'error' ? 'message error' : 'message success';
      messageBox.style.display = 'block';
    }

    submitButton.addEventListener('click', () => {
      messageBox.style.display = 'none';
      const email = emailInput.value.trim();
      const password = passwordInput.value;

      if (!email || !password) {
        showMessage('Please enter both email and password.', 'error');
        return;
      }

      $.ajax({
        url: '/api/v1/login',
        method: 'POST',
        contentType: 'application/json',
        data: JSON.stringify({ email, password }),
        success(data) {
          localStorage.setItem('bookverseToken', data.token);
          localStorage.setItem('bookverseUser', JSON.stringify(data.user));
          window.location.href = data.user && data.user.role === 'admin' ? '/admin' : '/profile';
        },
        error(xhr) {
          const data = xhr.responseJSON || {};
          showMessage(data.message || data.error || 'Login failed', 'error');
        }
      });
    });
  </script>
</body>
</html>
