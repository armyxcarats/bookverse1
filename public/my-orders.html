<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Orders</title>
  <link rel="stylesheet" href="/styles.css" />
  <style>
    body { padding: 20px; background: #f5f5f5; }
    .my-orders-page { max-width: 1100px; margin: 0 auto; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
    .header h1 { margin: 0; }
    .order-card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .order-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; padding-bottom: 12px; margin-bottom: 16px; }
    .order-header h3 { margin: 0; }
    .order-meta { display: flex; gap: 24px; font-size: 0.9rem; color: #666; margin-bottom: 16px; flex-wrap: wrap; }
    .order-meta-item { display: flex; flex-direction: column; }
    .order-meta-label { font-weight: 600; color: #333; }
    .status-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 0.85rem; font-weight: 600; }
    .status-pending { background: #fff3cd; color: #856404; }
    .status-shipping { background: #cfe2ff; color: #084298; }
    .status-on-delivery { background: #d1ecf1; color: #0c5460; }
    .status-delivered { background: #d4edda; color: #155724; }
    .status-cancelled { background: #f8d7da; color: #721c24; }
    .items-section { margin-bottom: 16px; }
    .items-section h4 { margin: 0 0 12px; color: #333; }
    .item-row { display: flex; gap: 12px; padding: 12px; border: 1px solid #eee; border-radius: 8px; margin-bottom: 8px; align-items: flex-start; }
    .item-image { width: 80px; height: 100px; object-fit: cover; border-radius: 6px; flex-shrink: 0; background: #f0f0f0; }
    .item-details { flex: 1; }
    .item-title { font-weight: 600; margin: 0 0 4px; }
    .item-meta { font-size: 0.9rem; color: #666; }
    .order-review-button { margin-top: 12px; display: inline-flex; align-items: center; gap: 8px; }
    .order-review-form { margin-top: 14px; border-top: 1px solid #e5e7eb; padding-top: 14px; }
    .order-review-form textarea { width: 100%; min-height: 100px; padding: 10px; border: 1px solid #d1d5db; border-radius: 12px; resize: vertical; }
    .order-review-form .rating-options { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 12px; }
    .order-review-form .rating-options label { display:flex; align-items:center; gap:6px; cursor:pointer; font-size:0.95rem; }
    .order-review-form .rating-options input { margin:0; }
    .order-review-form button { margin-top: 10px; }
    .order-review-message { margin-top: 10px; font-size: 0.95rem; }
    .payment-summary { background: #f9f9f9; padding: 12px; border-radius: 8px; margin-top: 12px; }
    .payment-row { display: flex; justify-content: space-between; margin-bottom: 6px; }
    .payment-row.total { border-top: 1px solid #ddd; padding-top: 6px; font-weight: 600; color: #333; }
    .empty-state { text-align: center; padding: 40px 20px; color: #999; }
    .back-link { display: inline-block; margin-bottom: 12px; color: #2c3e50; text-decoration: none; }
    .back-link:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="my-orders-page">
    <div class="header">
      <div>
        <a href="/" class="back-link">← Back to Store</a>
        <h1>My Orders</h1>
        <p>Track your orders and delivery status</p>
      </div>
      <div>
        <a href="/cart" class="button button-secondary">Back to Cart</a>
      </div>
    </div>
    <div id="ordersContainer" style="min-height: 200px;"></div>
    <div id="orderMessage" class="message" style="display:none; margin-bottom: 20px;"></div>
  </div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script>
    const token = localStorage.getItem('bookverseToken');
    const user = localStorage.getItem('bookverseUser') ? JSON.parse(localStorage.getItem('bookverseUser')) : null;

    function showMessage(text, type = 'info') {
      const el = document.getElementById('orderMessage');
      el.textContent = text;
      el.className = type === 'error' ? 'message error' : 'message';
      el.style.display = 'block';
    }

    function getStatusBadgeClass(status) {
      const statusLower = (status || 'pending').toLowerCase();
      if (statusLower === 'delivered') return 'status-delivered';
      if (statusLower === 'on delivery') return 'status-on-delivery';
      if (statusLower === 'shipping') return 'status-shipping';
      if (statusLower === 'cancelled') return 'status-cancelled';
      return 'status-pending';
    }

    function formatDate(dateString) {
      if (!dateString) return 'N/A';
      const date = new Date(dateString);
      return date.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
    }

    function estimateArrival(dateShipped) {
      if (!dateShipped) return 'N/A';
      const date = new Date(dateShipped);
      date.setDate(date.getDate() + 5); // Add 5 days for delivery estimate
      return date.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
    }

    // Delivery details are collected during checkout; remove inline editing here.

    async function loadMyOrders() {
      if (!token || !user) {
        localStorage.removeItem('bookverseToken');
        localStorage.removeItem('bookverseUser');
        window.location.href = '/login';
        return;
      }

      if (user.deleted_at) {
        localStorage.removeItem('bookverseToken');
        localStorage.removeItem('bookverseUser');
        window.location.href = '/login';
        return;
      }

      try {
        const response = await fetch('/api/v1/orders', {
          headers: { 'Authorization': `Bearer ${token}` }
        });

        if (!response.ok) {
          const body = await response.json();
          showMessage(body.error || 'Unable to load orders.', 'error');
          return;
        }

        const allOrders = await response.json();
        
        if (!Array.isArray(allOrders) || allOrders.length === 0) {
          document.getElementById('ordersContainer').innerHTML = '<div class="empty-state"><p>You have no orders yet.</p><p><a href="/" class="button button-primary">Start Shopping</a></p></div>';
          return;
        }

        // Fetch detailed order items
        const ordersWithItems = await Promise.all(allOrders.map(async order => {
          try {
            const itemRes = await fetch(`/api/v1/orders/${order.order_id}/items`, {
              headers: { 'Authorization': `Bearer ${token}` }
            });
            if (itemRes.ok) {
              const items = await itemRes.json();
              order.order_items = items;
            } else {
              order.order_items = [];
            }
          } catch (e) {
            order.order_items = [];
          }
          return order;
        }));

        renderOrders(ordersWithItems);
      } catch (error) {
        showMessage('Error loading orders.', 'error');
        console.error(error);
      }
    }

    function renderOrders(orders) {
      const container = document.getElementById('ordersContainer');
      
      if (!orders || orders.length === 0) {
        container.innerHTML = '<div class="empty-state"><p>You have no orders yet.</p></div>';
        return;
      }

      const html = orders.map(order => {
        const delivered = String(order.status || '').toLowerCase() === 'delivered';
        const itemsHtml = (order.order_items || []).map(item => {
          const reviewButton = delivered ? `
            <button type="button" class="button button-secondary order-review-button" data-item-id="${item.item_id}" data-item-title="${(item.description || 'Item').replace(/"/g, '&quot;')}">Write Review</button>
          ` : '';
          return `
          <div class="item-row" id="order-item-${item.item_id}">
            <img src="${item.img_path ? (item.img_path.startsWith('http') || item.img_path.startsWith('/') ? item.img_path : '/' + item.img_path) : 'https://via.placeholder.com/80'}" alt="${item.description || 'Item'}" class="item-image" onerror="this.src='https://via.placeholder.com/80';" />
            <div class="item-details">
              <div class="item-title">${item.description || 'Unknown Item'}</div>
              <div class="item-meta">Quantity: <strong>${item.quantity || 1}</strong></div>
              <div class="item-meta">Price: <strong>₱${Number(item.sell_price || 0).toFixed(2)}</strong></div>
              ${reviewButton}
              <div class="order-review-container" id="review-container-${item.item_id}" style="display:none;"></div>
            </div>
          </div>
        `}).join('');

        const totalAmount = order.total_amount || 0;
        const arrivalDate = estimateArrival(order.date_shipped);

        return `
          <div class="order-card">
            <div class="order-header">
              <div>
                <h3>Order #${order.order_id}</h3>
              </div>
              <div>
                <span class="status-badge ${getStatusBadgeClass(order.status)}">${order.status || 'pending'}</span>
              </div>
            </div>
            
            <div class="order-meta">
              <div class="order-meta-item">
                <span class="order-meta-label">Placed</span>
                <span>${formatDate(order.date_placed)}</span>
              </div>
              <div class="order-meta-item">
                <span class="order-meta-label">Est. Arrival</span>
                <span>${arrivalDate}</span>
              </div>
              ${ (order.shipping_address || order.shipping_zipcode || order.shipping_phone) ? `
              <div class="order-meta-item">
                <span class="order-meta-label">Shipping Address</span>
                <span>${order.shipping_address || 'N/A'}</span>
              </div>
              <div class="order-meta-item">
                <span class="order-meta-label">Zip Code</span>
                <span>${order.shipping_zipcode || 'N/A'}</span>
              </div>
              <div class="order-meta-item">
                <span class="order-meta-label">Phone</span>
                <span>${order.shipping_phone || 'N/A'}</span>
              </div>
              ` : '' }
            </div>

            <!-- Delivery details editing removed: details are set during checkout -->

            <div class="items-section">
              <h4>Items (${(order.order_items || []).length})</h4>
              ${itemsHtml || '<p style="color: #999;">No items found.</p>'}
            </div>

            <div class="payment-summary">
              <div class="payment-row">
                <span>Subtotal:</span>
                <span>₱${Number(totalAmount || 0).toFixed(2)}</span>
              </div>
              <div class="payment-row">
                <span>Shipping:</span>
                <span>₱${Number(order.shipping || 0).toFixed(2)}</span>
              </div>
              <div class="payment-row total">
                <span>Amount Paid:</span>
                <span>₱${Number(totalAmount || 0).toFixed(2)}</span>
              </div>
            </div>
          </div>
        `;
      }).join('');

      container.innerHTML = html;
      attachReviewButtonHandlers();
    }

    function attachReviewButtonHandlers() {
      document.querySelectorAll('.order-review-button').forEach(button => {
        button.addEventListener('click', () => {
          const itemId = button.dataset.itemId;
          const itemTitle = button.dataset.itemTitle;
          toggleReviewForm(itemId, itemTitle);
        });
      });
    }

    function toggleReviewForm(itemId, itemTitle) {
      const container = document.getElementById(`review-container-${itemId}`);
      if (!container) return;
      if (container.style.display === 'block') {
        container.style.display = 'none';
        container.innerHTML = '';
        return;
      }
      container.style.display = 'block';
      container.innerHTML = `
        <form class="order-review-form" data-item-id="${itemId}">
          <div class="rating-options">
            <label><input type="radio" name="rating-${itemId}" value="5"> ★ 5</label>
            <label><input type="radio" name="rating-${itemId}" value="4"> ★ 4</label>
            <label><input type="radio" name="rating-${itemId}" value="3"> ★ 3</label>
            <label><input type="radio" name="rating-${itemId}" value="2"> ★ 2</label>
            <label><input type="radio" name="rating-${itemId}" value="1"> ★ 1</label>
          </div>
          <textarea name="reviewText" placeholder="Write your review for ${itemTitle}..."></textarea>
          <button type="submit" class="button button-primary">Submit Review</button>
          <div class="order-review-message" id="review-message-${itemId}" style="display:none"></div>
        </form>
      `;
      const form = container.querySelector('.order-review-form');
      if (form) {
        form.addEventListener('submit', submitOrderReview);
      }
    }

    async function submitOrderReview(event) {
      event.preventDefault();
      const form = event.currentTarget;
      const itemId = form.dataset.itemId;
      const ratingInput = form.querySelector(`input[name="rating-${itemId}"]:checked`);
      const comment = form.querySelector('textarea[name="reviewText"]').value.trim();
      const messageBox = document.getElementById(`review-message-${itemId}`);
      if (!messageBox) return;
      messageBox.style.display = 'block';
      if (!ratingInput || !comment) {
        messageBox.textContent = 'Please choose a rating and write a comment.';
        messageBox.style.color = '#b91c1c';
        return;
      }
      const token = localStorage.getItem('bookverseToken');
      if (!token) {
        messageBox.textContent = 'You must be logged in to submit a review.';
        messageBox.style.color = '#b91c1c';
        return;
      }
      try {
        const response = await fetch('/api/v1/reviews', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            Authorization: `Bearer ${token}`
          },
          body: JSON.stringify({ item_id: Number(itemId), rating: Number(ratingInput.value), review_text: comment })
        });
        const data = await response.json();
        if (!response.ok) {
          messageBox.textContent = data.error || 'Unable to submit review.';
          messageBox.style.color = '#b91c1c';
          return;
        }
        messageBox.textContent = 'Your review has been submitted successfully. Redirecting to the item page...';
        messageBox.style.color = '#155724';
        form.reset();
        localStorage.setItem('bookverseReviewRedirect', JSON.stringify({ itemId: Number(itemId) }));
        setTimeout(() => {
          window.location.href = '/';
        }, 700);
      } catch (error) {
        messageBox.textContent = 'Review submission failed. Please try again later.';
        messageBox.style.color = '#b91c1c';
      }
    }

    // Load orders on page load
    loadMyOrders();
  </script>
</body>
</html>
